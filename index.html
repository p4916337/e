        /* 顶部标 题栏 */
        .header {

            display: flex;

        }

        .header-title {

        }

        }

        /* 个人信息卡片 */
        .profile-card {

            text-align: center;
        }

            font-weight: bold;
            margin: 10px 0;
            color: #fff;
        }

            font-size: 20px;
            color: #e63946;
            margin: 10px 0;
        }

        .profile-btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* 红色通知栏 */
        .notice-bar {
            background-color: #ff0000;
            color: #fff;
            text-align: center;
            padding: 8px;
            margin: 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        /* 标签栏 */
        .tabs {
            display: flex;
            margin: 10px;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 5px 5px 0 0;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-item.active {
            opacity: 1;
        }

        .tab-hot {
            background: linear-gradient(to right, #7b68ee, #ff69b4);
        }

        .tab-software {
            background-color: #e0e0e0;
            color: #333;
        }

        /* 功能按钮栏 */
        .btn-group {
            display: flex;
            margin: 0 10px;
            gap: 5px;
        }

        .func-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-hack {

        }

        .btn-coin {
            background-color: #ff8c00;
        }

        .btn-vpn {
            background-color: #00bfff;
        }

        /* 游戏列表 */
        .game-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px;
        }

        .game-item {
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .game-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 10px;
            background-color: #eee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
            color: #fa0000;
        }

        .game-desc {
            font-size: 12px;
            color: #FF0099;
        }

        /* 底部导航 */

            background-color: #fff;

        }

            margin-bottom: 5px;
